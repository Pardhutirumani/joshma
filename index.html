<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Talkie - Voice Chatbot + File Upload</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.container{background:white;padding:25px;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,0.2);width:500px;text-align:center}
h2{margin-bottom:15px;color:#333;display:flex;align-items:center;justify-content:center;gap:8px}
.row{display:flex;gap:8px;margin-bottom:12px}
input{width:100%;padding:12px;border:2px solid #667eea;border-radius:10px;font-size:15px;outline:none}
input:focus{border-color:#764ba2}
button{padding:12px 18px;border:none;border-radius:10px;cursor:pointer;font-weight:bold;font-size:14px;transition:0.2s}
button:hover{opacity:0.9}
.ask{background:#28a745;color:white}
.mic{background:#ef41d2;color:white;width:50px}
.file{background:#2196f3;color:white}
.clear{background:#9e9e9e;color:white}
.recording{background:#d32f2f!important; animation: pulse 1s infinite;}
@keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
#answer{margin-top:15px;padding:15px;background:#f3e5f5;border-radius:10px;text-align:left;min-height:80px;font-size:16px;max-height:250px;overflow-y:auto;color:#333}
#preview{margin-top:10px;max-width:100%;border-radius:8px;max-height:200px}
#fileName{font-size:12px;color:#555;margin-top:5px}
</style>
</head>
<body>
<div class="container">
  <h2>🤖 My Talkie</h2>
  <div class="row">
    <input type="text" id="question" placeholder="Ask me anything...">
    <button class="mic" id="micBtn">🎤</button>
  </div>
  <div class="row">
    <input type="file" id="fileInput" accept="image/*,.pdf,.txt" style="display:none">
    <button class="file" onclick="document.getElementById('fileInput').click()">📎 Upload</button>
    <button class="ask" onclick="ask()">Send</button>
    <button class="clear" onclick="clearAll()">🗑️</button>
  </div>
  <div id="fileName"></div>
  <img id="preview" style="display:none">
  <div id="answer">Hi! I'm My Talkie. Ask me something or upload a file.</div>
</div>

<script>
const answerDiv = document.getElementById('answer');
const questionInput = document.getElementById('question');
const micBtn = document.getElementById('micBtn');
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
const preview = document.getElementById('preview');

let selectedFile = null;
let voices = [];
function loadVoices(){ voices = speechSynthesis.getVoices(); }
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;

function getVoice(langCode){
  langCode = langCode.split('-')[0];
  let voice = voices.find(v => v.lang.startsWith(langCode) && v.name.toLowerCase().includes('female'));
  return voice || voices.find(v => v.lang.startsWith(langCode)) || voices[0];
}

function speak(text, lang){
  speechSynthesis.cancel();
  let utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = getVoice(lang);
  utterance.lang = lang;
  utterance.rate = 1;
  utterance.pitch = 1.1;
  speechSynthesis.speak(utterance);
}

fileInput.onchange = (e) => {
  selectedFile = e.target.files[0];
  if(selectedFile){
    fileName.innerText = "Selected: " + selectedFile.name;
    if(selectedFile.type.startsWith('image/')){
      preview.src = URL.createObjectURL(selectedFile);
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }
}

function clearAll(){
  questionInput.value = '';
  selectedFile = null;
  fileInput.value = '';
  fileName.innerText = '';
  preview.src = '';
  preview.style.display = 'none';
  answerDiv.innerHTML = 'Hi! I\'m My Talkie. Ask me something or upload a file.';
  speechSynthesis.cancel();
}

async function ask(){
  let q = questionInput.value.trim();
  let lang = questionInput.getAttribute('data-lang') || 'en-IN';
  if(!q &&!selectedFile) return;

  answerDiv.innerHTML = 'Thinking...';

  let formData = new FormData();
  formData.append('message', q);
  formData.append('lang', lang);
  if(selectedFile) formData.append('file', selectedFile);

  try{
    let res = await fetch('http://127.0.0.1:8000/ask', {method: 'POST', body: formData});
    let data = await res.json();
    answerDiv.innerHTML = data.reply;
    speak(data.reply, data.lang);
  } catch(e){
    answerDiv.innerHTML = "Error: Make sure Flask is running on port 8000";
  }
}

// VOICE RECOGNITION
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-IN,te-IN,hi-IN,ta-IN,bn-IN,mr-IN';
  recognition.continuous = false;
  micBtn.onclick = () => {
    micBtn.classList.add('recording');
    recognition.start();
  };
  recognition.onresult = (event) => {
    questionInput.value = event.results[0][0].transcript;
    questionInput.setAttribute('data-lang', event.results[0][0].lang);
    micBtn.classList.remove('recording');
  };
  recognition.onend = () => micBtn.classList.remove('recording');
}
</script>
</body>
</html>
